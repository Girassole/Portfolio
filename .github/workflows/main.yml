name: Desplegar React a GitHub Pages

on:
  push:
    branches: ["main"] # Cambia esto si tu rama principal se llama master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar proyecto
        run: npm run build

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # Si usas Vite, la carpeta compilada se llama 'dist'. Si usas Create React App, se llama 'build'.
          path: './dist' 

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
